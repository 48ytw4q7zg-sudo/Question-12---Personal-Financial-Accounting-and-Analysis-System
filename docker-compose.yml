# Q-CR v21 Docker Compose — creator qxw · 2501060122
# 安全修复：移除硬编码密钥、MySQL 端口不对外暴露、添加容器重启策略
# 使用方式：docker compose up -d（确保已设置 DB_PASSWORD / JWT_SECRET / CORS_ALLOWED_ORIGINS 环境变量）

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-ChangeMeInProduction}
      MYSQL_DATABASE: finance_db
    # 安全加固：MySQL 端口仅绑定 127.0.0.1，不对外暴露
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./system/sql/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finance-net

  backend:
    build: ./system/backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/finance_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-ChangeMeInProduction}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-jwt-secret-env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      SERVER_PORT: 8080
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - finance-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build: ./system/frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - finance-net

networks:
  finance-net:
    driver: bridge

volumes:
  mysql_data:
