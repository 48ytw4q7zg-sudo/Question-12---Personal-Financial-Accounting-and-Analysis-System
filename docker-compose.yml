# Q-CR v13 Docker Compose — creator qxw · 2501060122
version: '3.8'

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: finance_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./system/sql/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./system/backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/finance_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      DB_USERNAME: root
      DB_PASSWORD: root
      JWT_SECRET: production-secret-at-least-32-bytes-long
      CORS_ALLOWED_ORIGINS: http://localhost
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./system/frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
