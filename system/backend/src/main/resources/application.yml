# ============================================================
# 个人财务记账与分析系统 - Spring Boot 应用配置
# ============================================================
# 环境区分: 本文件为通用配置, 敏感信息通过环境变量注入
# 开发环境: 使用默认值(如 DB_USERNAME:root)
# 生产环境: 必须设置 DB_USERNAME / DB_PASSWORD / JWT_SECRET 环境变量
# ============================================================

# --- 服务器配置 ---
server:
  port: 8080  # 后端服务端口, 前端 Vite proxy 代理到 localhost:8080

# --- 数据源配置 ---
spring:
  datasource:
    # 数据库连接URL: finance_db 为项目数据库, utf8mb4 支持中文, Asia/Shanghai 时区
    url: jdbc:mysql://localhost:3306/finance_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    # 数据库用户名: 优先读环境变量 DB_USERNAME, 未设置时默认 root(开发环境)
    username: ${DB_USERNAME:root}
    # 数据库密码: 优先读环境变量 DB_PASSWORD, 未设置时默认 root(⚠️ 生产环境必须设置环境变量!)
    password: ${DB_PASSWORD:root}
    # MySQL 8.4 驱动
    driver-class-name: com.mysql.cj.jdbc.Driver

  # --- Jackson JSON 序列化配置 ---
  jackson:
    # LocalDateTime 序列化格式: yyyy-MM-dd HH:mm:ss (对齐前端 axios 时间解析)
    date-format: yyyy-MM-dd HH:mm:ss
    # 时区: 东八区(北京时间)
    time-zone: Asia/Shanghai
    serialization:
      # 禁用时间戳序列化(不输出毫秒数), 使用 date-format 字符串格式
      write-dates-as-timestamps: false

# --- MyBatis-Plus 配置 ---
mybatis-plus:
  # XML Mapper 文件位置
  mapper-locations: classpath:mapper/*.xml
  # Entity 类扫描包(简化 XML 中 resultType 的全限定名)
  type-aliases-package: com.example.finance.entity
  configuration:
    # 下划线转驼峰: 数据库字段 user_id 自动映射 Java 字段 userId
    map-underscore-to-camel-case: true
    # SQL 日志输出: StdOutImpl 打印 SQL 到控制台(⚠️ 生产环境应关闭, 改为 log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl)
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# --- JWT 配置 ---
jwt:
  # JWT 签名密钥: 优先读环境变量 JWT_SECRET, 未设置时使用占位符(⚠️ 生产环境必须设置强密钥!)
  # 密钥要求: HS256 算法至少 32 字节, 建议使用随机字符串
  secret: ${JWT_SECRET:CHANGE-ME-IN-PRODUCTION-USE-JWT_SECRET-ENV}
  # Token 有效期: 604800000 毫秒 = 7 天 (7 × 24 × 60 × 60 × 1000)
  expire: 604800000

# --- 日志配置 ---
logging:
  level:
    # 项目包日志级别: 优先读环境变量 LOG_LEVEL, 默认 info
    # 开发时可设为 debug 查看更详细的日志, 生产环境保持 info
    com.example.finance: ${LOG_LEVEL:info}
