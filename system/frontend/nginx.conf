server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # 安全加固：防止 CSV 导入文件过大导致 413 错误（后端限制 5MB，nginx 设为 6MB 留 multipart 开销余量）
    client_max_body_size 6m;
    # 代理超时配置（防止后端长时间处理时 nginx 提前断开）
    proxy_connect_timeout 30s;
    proxy_read_timeout 60s;
    proxy_send_timeout 30s;

    # 安全加固：HTTP 响应安全头（防点击劫持 + 防 MIME 嗅探 + 防 XSS + 引用策略）
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip 压缩：减少 JS/CSS 传输大小，提升首屏加载速度
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain application/javascript application/json text/css image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源强缓存（JS/CSS 文件名含内容哈希，可安全使用永久缓存）
    location ~* \.(js|css|woff2?|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /api {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
