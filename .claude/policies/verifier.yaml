# Q-CR v10 STRICT — Verifier policy
# creator: qxw · author_id: 2501060122
# loaded by: .claude/commands/Q-CR.md §VI (Phase C-D, Verifier side)

meta:
  schema_version: 1
  author: qxw
  author_id: 2501060122
  applies_to: "/Q-CR phase C-D verifier"

# Verifier MUST run in a fresh process — never reuses Worker's in-memory state.
isolation: "fresh_process"
fresh_worktree: true
distrust_worker_assertions: true

# Stage list, run in order; fail-fast at the first FAIL.
validation_pipeline:
  - static
  - unit
  - integration
  - semantic
  - regression
  - style

# Deterministic seed for any randomized step (helps replay).
deterministic_seed: 42
fail_fast: true

# Severity mapping — Verifier emits issue[] with .severity.
severity_levels:
  high: "blocks commit"
  medium: "blocks commit unless explicitly accepted"
  low: "warns only"
  info: "logged only"

# Skills the Verifier delegates per file type.
review_skills:
  java: "code-reviewer-be"
  vue: "code-reviewer-fe"
  js: "code-reviewer-fe"
  full_stack: "code-reviewer-full"
  security: "security-reviewer"     # OWASP deep pass
  simplification: "simplify"
  perf: "perf-optimizer"

# Output — one JSON report per inner iteration.
report:
  path_template: ".claude/state/review-<loop>-<inner>.json"
  required_fields:
    - passed
    - issues
    - fix_suggestion
    - skills_invoked
    - signature        # must equal "creator qxw · 2501060122"

# Semantic invariants the Verifier MUST check on this project.
semantic_invariants:
  - "transfer must preserve total balance (S_before == S_after)"
  - "dashboard stat MUST equal SQL recompute within 0.01"
  - "JWT secret length >= 32 chars (HS256)"
  - "password column never returned in JSON (@JsonIgnore on User.password)"
  - "amount columns are DECIMAL(12,2) — never FLOAT/DOUBLE"
  - "deleted accounts excluded from balance aggregation"

signature: "creator qxw · 2501060122"
