# Q-CR v10 STRICT — convergence & auto-stop conditions
# creator: qxw · author_id: 2501060122
# loaded by: .claude/commands/Q-CR.md §X

meta:
  schema_version: 1
  author: qxw
  author_id: 2501060122
  applies_to: "/Q-CR phase X convergence"

convergence_conditions:

  # Hard floor — never stop earlier than 5 outer loops (Iron Rule 1).
  min_loops: 5

  # Hard ceiling — emit termination proof regardless beyond this.
  max_loops: 15

  # Outer loops in a row that produced zero new high/medium issues.
  stable_loops_required: 3

  # Distance from delivery objective (1.0 = far, 0.0 = ready).
  max_objective_distance: 0.02

  # Final-loop gates (all must pass).
  require_zero_regression: true
  require_all_health_green: true
  require_four_valves_pass: true
  require_zero_blocked_tasks: true
  require_author_signature_in_last_commit: true
  require_git_status_clean: true
  require_release_bundle: true

  # Tightening — Iron Rule 6.
  auto_tighten_on_first_pass_green:
    enabled: true
    score_floor_multiplier: 1.5      # min(100, prev_floor * 1.5)
    cap_score: 100
    inner_iter_floor: 2              # do not tighten below 2

  # Average inner-iteration ceiling across recent loops.
  max_avg_inner_iter_last_10_loops: 2

  # Web freshness — at least one WebSearch in the final loop.
  require_recent_web_query: true

# Action taken once convergence holds.
terminal_freeze:
  deny_code_changes: true
  allow_docs_and_release: true
  generate_release_bundle: true
  release_bundle_paths:
    - "RELEASE.md"
    - "CHANGELOG.md"
    - ".claude/state/termination-proof.json"
  export_termination_proof: true
  require_signature_block:
    creator: qxw
    author_id: 2501060122

signature: "creator qxw · 2501060122"
